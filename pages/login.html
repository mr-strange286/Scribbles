<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Scribbles</title>

    <link rel="icon" href="../assets/logo/scribbles-logo.png">

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

<section class="login-page">

    <div class="login-card">

        <img src="../assets/logo/scribbles-logo.png"
             class="login-logo"
             alt="Scribbles Logo">

        <h1>Welcome Back</h1>

        <h2>The Literary Club of IIT Tirupati</h2>

        <p class="login-text">

            Continue your creative journey with Scribbles.

        </p>

        <button id="googleLogin" class="google-btn">

            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

            <span>Continue with Google</span>

        </button>

        <div class="login-features">

            <div>✍ Publish Stories</div>

            <div>🪶 Share Poetry</div>

            <div>📚 Read StoryVerse</div>

            <div>🎮 Play Word Games</div>

        </div>

        <p class="secure-text">

            Secure sign in powered by Google & Firebase

        </p>

        <a class="back-home" href="../index.html">

            ← Back to Home

        </a>

    </div>

</section>

<script type="module" src="../js/login.js"></script>

</body>

</html>
